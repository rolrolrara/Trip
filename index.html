<html lang="ko">
<head>

<style>

    padding: 24px;
    color: #1a1a1a;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  header {
    background: white;
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
  header h1 {
    font-size: 28px;
    color: #0077b6;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header .subtitle {
    color: #555;
    margin-top: 6px;
    font-size: 14px;
  }
  .date-range {

    margin-top: 16px;
    flex-wrap: wrap;
  }
  .date-range label {
    font-size: 13px;
    color: #444;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .date-range input {
    padding: 8px 12px;

    border-radius: 8px;
    font-size: 14px;
  }
  .tabs {

    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .tab {
    flex: 1;
    min-width: 130px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.7);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #0077b6;
    transition: all 0.2s;
    text-align: center;
  }
  .tab:hover { background: rgba(255,255,255,0.95); }
  .tab.active {
    background: white;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    color: #023e8a;
    transform: translateY(-2px);
  }
  .tab .day-num { display: block; font-size: 18px; margin-bottom: 2px; }
  .tab .day-label { font-size: 11px; opacity: 0.7; font-weight: 500; }
  .day-panel {
    background: white;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);

  }
  .day-panel.active { display: block; }
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 2px solid #f0f0f0;
  }
  .day-header h2 {
    color: #0077b6;
    font-size: 22px;
  }
  .day-header .date {
    color: #666;
    font-size: 14px;
  }
  .add-btn {
    background: #0077b6;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .add-btn:hover { background: #023e8a; }
  .schedule-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .schedule-row {
    background: #f8fbfd;
    border-left: 4px solid #00b4d8;
    border-radius: 10px;
    transition: all 0.2s;
    overflow: hidden;
  }
  .schedule-row:hover { background: #eaf6fb; }
  .schedule-item {
    display: grid;
    grid-template-columns: 120px 50px 1fr auto auto auto;
    gap: 14px;
    align-items: center;
    padding: 14px 16px;
  }
  .schedule-item input.time {
    background: transparent;
    border: none;
    font-size: 15px;
    font-weight: 600;
    color: #0077b6;
    outline: none;
    width: 100%;
  }
  .schedule-item select.type {
    background: transparent;
    border: none;
    font-size: 18px;
    outline: none;
    cursor: pointer;
    text-align: center;
  }
  .schedule-item input.activity {
    background: transparent;
    border: none;
    font-size: 14px;
    outline: none;
    width: 100%;
    padding: 4px 0;
  }
  .schedule-item input:focus, .schedule-item select:focus {
    background: white;
    border-radius: 6px;
    padding: 4px 8px;
  }
  .schedule-item .icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 6px 8px;
    border-radius: 6px;
    opacity: 0.5;
    transition: all 0.2s;
  }
  .schedule-row:hover .icon-btn { opacity: 1; }
  .schedule-item .map-btn { color: #0077b6; }
  .schedule-item .map-btn:hover { background: #d8efff; }
  .schedule-item .map-btn.active { opacity: 1; background: #ade8f4; }
  .schedule-item .del-btn { color: #c0392b; }
  .schedule-item .del-btn:hover { background: #fdecea; }
  .schedule-item .detail-btn { color: #888; }
  .schedule-item .detail-btn:hover { background: #f0f0f0; }
  .schedule-item .detail-btn.active { opacity: 1; background: #fff3cd; color: #856404; }
  .schedule-item .detail-btn.has-detail { opacity: 1; color: #e67e22; }
  .detail-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .detail-panel.open { max-height: 260px; }
  .detail-panel textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px 16px;
    border: none;
    border-top: 1px solid #e0eef5;
    background: #fffdf0;
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    font-family: inherit;
    color: #333;
    display: block;
  }
  .detail-panel textarea:focus { background: #fffbe6; }
  .map-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: white;
  }
  .map-panel.open { max-height: 360px; }
  .map-panel iframe {
    width: 100%;
    height: 320px;
    border: none;
    display: block;
  }
  .map-panel .map-link {
    display: block;
    padding: 8px 16px;
    background: #f0f8fc;
    font-size: 12px;
    color: #0077b6;
    text-decoration: none;
    border-top: 1px solid #e0eef5;

  .map-panel .map-link:hover { background: #e0f3fb; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
  }
  .summary-bar {
    margin-top: 24px;
    padding: 16px 20px;
    background: linear-gradient(90deg, #caf0f8, #ade8f4);
    border-radius: 12px;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 12px;

  .summary-bar .stat {
    text-align: center;
  }
  .summary-bar .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: #023e8a;
  }
  .summary-bar .stat-label {
    font-size: 12px;
    color: #555;
    margin-top: 2px;
  }
  .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .actions button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .btn-save { background: #06a77d; color: white; }
  .btn-export { background: white; color: #0077b6; border: 1px solid #0077b6; }

  @media (max-width: 600px) {

    .day-panel { padding: 16px 12px; border-radius: 14px; }
    .day-header h2 { font-size: 16px; }
    .day-header .date { font-size: 12px; }
    .add-btn { padding: 8px 12px; font-size: 12px; }
    .schedule-item {

      padding: 10px 10px;

    .schedule-item input.time { font-size: 12px; }
    .schedule-item select.type { font-size: 16px; }
    .schedule-item input.activity { font-size: 12px; }
    .schedule-item .icon-btn { font-size: 14px; padding: 5px 5px; }

    .actions { flex-wrap: wrap; }
    .actions button { flex: 1; min-width: 100px; font-size: 12px; padding: 9px 12px; }
  }
</style>
</head>

</div>

    { time: '17:30', type: 1, activity: '베셀 호텔 캄파나 오키나와 체크인 (2박, 예약번호: 1400823286556555)', detail: '• 예약번호: 1400823286556555\n• 2박\n• 차탄 미하마 아메리칸 빌리지 인근\n• 수영장·사우나 완비' },
    { time: '19:00', type: 3, activity: '미국촌 (아메리칸 빌리지) 야경 산책', detail: '• 야경이 훨씬 예쁨 — 대관람차 조명\n• 아이스크림·타코 등 먹거리 많음\n• 저녁 식사 겸 산책' },
    { time: '21:00', type: 2, activity: '저녁 - 미하마 근처', detail: '' },
    { time: '22:00', type: 6, activity: '호텔 사우나', detail: '' },
  ]},
  4: { label: '만자모 → 부세나 + 물놀이', items: [
    { time: '09:00', type: 2, activity: '여유로운 조식', detail: '' },
    { time: '10:00', type: 7, activity: '출발 → 온나손 (차 40분)', detail: '' },
    { time: '10:40', type: 3, activity: '만자모 (万座毛) 절경 감상', mapUrl: '万座毛 恩納村', detail: '• 코끼리 코 모양 바위 절경\n• 입장료 있음 (정비 후 유료화)\n• 전망대에서 에메랄드빛 바다 감상\n• 20~30분이면 충분' },
    { time: '11:15', type: 6, activity: '부세나 해중공원 또는 온나촌 해변 (미정)', mapUrl: '部瀬名海中公園 恩納村', detail: '▶ 부세나 해중공원\n• 글래스보트: 유리 바닥 보트로 해저 관찰, 약 20분\n• 해중전망탑: 바닷속 360° 전망\n• 세트권 구매 추천\n• 아이들이 매우 좋아하는 코스\n\n▶ 온나촌 해변\n• 온나손 일대 해변에서 자유롭게 물놀이\n• 별도 입장료 없음\n• 만자모 바로 근처라 이동 편리' },
    { time: '13:30', type: 2, activity: '점심 - 부세나 근처', detail: '' },
    { time: '15:00', type: 7, activity: '호텔 복귀 (차 40분)', detail: '' },
    { time: '15:30', type: 6, activity: '호텔 풀에서 물놀이 & 휴식', detail: '• 베셀 호텔 수영장\n• 오후 여유롭게 물놀이 & 휴식' },
    { time: '17:30', type: 6, activity: '선시 비치 일몰 물놀이', detail: '• 차탄 북쪽 해변\n• 일몰 약 19:20\n• 물 맑고 파도 잔잔한 편' },
    { time: '19:30', type: 2, activity: '저녁 - 미하마 패밀리 레스토랑', detail: '' },
    { time: '21:30', type: 6, activity: '호텔 사우나', detail: '' },
  ]},
  5: { label: '귀국', items: [
    { time: '08:00', type: 2, activity: '조식', detail: '' },
    { time: '09:00', type: 6, activity: '선시 비치 또는 호텔 풀에서 마지막 물놀이', detail: '• 마지막 물놀이\n• 체크아웃 전 짐 먼저 정리해두기' },
    { time: '10:30', type: 1, activity: '베셀 호텔 캄파나 오키나와 체크아웃', detail: '• 귀중품·충전기 빠짐없이 확인\n• 짐은 프런트에 맡겨도 됨' },
    { time: '11:00', type: 7, activity: '공항 방면 이동', detail: '' },
    { time: '11:30', type: 2, activity: '점심 - 공항 근처', detail: '• 나하 공항 근처 식당\n• 시간 여유 있으면 국제거리 근처도 가능' },
    { time: '12:30', type: 7, activity: '릴랙스 렌트카 반납', detail: '• 반납 전 주유 확인 (만탱크 조건 여부)\n• 차량 내 물건 빠짐없이 확인\n• 반납 후 공항까지 셔틀 운행' },
    { time: '13:00', type: 0, activity: '공항 체크인', detail: '• 나하공항 국제선 터미널\n• 출발 2시간 전 체크인 권장\n• 면세점 쇼핑 시간 확보' },
    { time: '15:00', type: 0, activity: '나하공항 출발 (인천행)', detail: '' },
    { time: '17:35', type: 0, activity: '인천공항 도착', detail: '' },
  ]},
};

let data = JSON.parse(localStorage.getItem('okinawaTrip')) || DEFAULT_DATA;
// detail 필드 없는 구버전 데이터 마이그레이션
for (let d = 1; d <= 5; d++) {
  if (data[d]) {
    data[d].items.forEach((item, idx) => {
      if (item.detail === undefined) {
        item.detail = (DEFAULT_DATA[d] && DEFAULT_DATA[d].items[idx] && DEFAULT_DATA[d].items[idx].detail) || '';
      }
    });
  }
}
// 장소 변경 마이그레이션: 에메랄드 비치 → 비세자키 (Day 1)
if (data[1]) {
  data[1].items.forEach(item => {
    if (item.activity.includes('에메랄드 비치 일몰')) {
      item.activity = '비세자키 일몰 산책 — 숙소 도보 15분, 서쪽 바다 조망 (일몰 19:22)';
      item.detail = '• 숙소에서 비세 후쿠기 가로수길 따라 도보 약 15분\n• 비세 반도 끝 곶(岬) — 서쪽 바다가 탁 트임\n• 주변에 아무것도 없어 조용하고 노을 감상 최적\n• 19:00~19:30 황금빛 노을 타이밍\n• 돌아올 때도 가로수길 야경 예쁨';
    }
  });
}
// Day 3 일정 변경 마이그레이션: → 세소코 스노클링 경유 차탄
if (data[3] && !data[3].items.some(item => item.activity.includes('세소코'))) {
  data[3] = JSON.parse(JSON.stringify(DEFAULT_DATA[3]));
}
// Day 4 일정 변경 마이그레이션: 만자모 추가
if (data[4] && !data[4].items.some(item => item.activity.includes('만자모'))) {
  data[4] = JSON.parse(JSON.stringify(DEFAULT_DATA[4]));
}
// Day 2 일정 변경 마이그레이션: 에메랄드 비치 물놀이 → 츄라우미 수족관 + 스노클링 + 후쿠키야
if (data[2] && (
  data[2].items.some(item => item.activity.includes('에메랄드 비치 물놀이')) ||
  data[2].items.some(item => item.activity.includes('모토부 참치 맛집'))
)) {
  data[2] = JSON.parse(JSON.stringify(DEFAULT_DATA[2]));
}
// 이동 아이콘 → 자동차 마이그레이션 (비행기 항목 제외)
const FLIGHT_KEYWORDS = ['인천공항 출발', '나하공항 출발', '나하공항 도착', '인천공항 도착', '공항 출구', '공항 체크인'];
for (let d = 1; d <= 5; d++) {
  if (data[d]) {
    data[d].items.forEach(item => {
      if (item.type === 0 && !FLIGHT_KEYWORDS.some(kw => item.activity.includes(kw))) {
        item.type = 7;
      }
    });
  }
}
// 항목별 detail 마이그레이션: 빅익스프레스 메모 업데이트
if (data[1]) {
  data[1].items.forEach(item => {
    if (item.activity.includes('빅익스프레스') && !item.detail.includes('다음날 저녁')) {
      item.detail = '🌙 저녁\n• 초밥, 도시락 등\n\n🌅 아침\n• 주먹밥, 컵라면\n• 음료, 얼음, 물\n\n🔥 다음날 저녁\n• 구워먹을 고기';
    }
  });
}
// 2일차 저녁 마이그레이션: 파라 모토부 치킨 + 일정 재편
if (data[2]) {
  data[2].items.forEach(item => {
    if (item.activity.includes('저녁 - 비세/모토부') || item.activity.includes('파라 모토부 치킨 테이크아웃 →')) {
      item.time = '19:00';
      item.type = 2;
      item.activity = '숙소에서 저녁 — 치킨 먹으며 바다 경치 감상 (일몰 19:23)';
      item.mapUrl = undefined;
      item.detail = '• 파라 모토부 치킨\n• 숙소 창가/테라스에서 일몰 바라보며\n• 맥주 한 캔이랑 최고의 조합';
    }
    if (item.activity.includes('비세자키 일몰 감상') && item.time === '18:30') {
      item.activity = '파라 모토부 치킨 테이크아웃 출발';
      item.type = 0;
      item.mapUrl = 'パーラーもとぶ田園 本部町';
      item.detail = '• 숙소에서 차로 약 10~15분\n• 테이크아웃 주문 후 바로 복귀';
    }
  });
}
let activeDay = 1;

function formatDate(startStr, offset) {
  const d = new Date(startStr);
  d.setDate(d.getDate() + offset);
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${'일월화수목금토'[d.getDay()]})`;
}

function updateEndDate() {
  const start = document.getElementById('startDate').value;
  if (!start) return;
  const d = new Date(start);
  d.setDate(d.getDate() + 4);
  document.getElementById('endDate').value = d.toISOString().split('T')[0];
  renderTabs();
  renderPanels();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const start = document.getElementById('startDate').value;
  tabs.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === activeDay ? ' active' : '');
    btn.innerHTML = `<span class="day-num">DAY ${i}</span><span class="day-label">${data[i].label} · ${formatDate(start, i-1)}</span>`;
    btn.onclick = () => { activeDay = i; renderTabs(); renderPanels(); };
    tabs.appendChild(btn);
  }
}

function renderPanels() {
  const panels = document.getElementById('panels');
  panels.innerHTML = '';
  const start = document.getElementById('startDate').value;

  for (let i = 1; i <= 5; i++) {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i === activeDay ? ' active' : '');

    const items = data[i].items;
    const itemsHtml = items.length === 0
      ? `<div class="empty">아직 일정이 없습니다. '+ 일정 추가' 버튼을 눌러보세요.</div>`
      : items.map((item, idx) => {
          const mappable = [1, 2, 3, 4, 5, 6].includes(item.type);
          const query = item.mapUrl
            ? encodeURIComponent(item.mapUrl)
            : encodeURIComponent(extractPlace(item.activity) + ' 오키나와');
          return `
        <div class="schedule-row">
          <div class="schedule-item">
            <input type="time" class="time" value="${item.time}" onchange="updateItem(${i}, ${idx}, 'time', this.value)">
            <select class="type" onchange="updateItem(${i}, ${idx}, 'type', this.value)">
              ${TYPES.map((t, ti) => `<option value="${ti}" ${ti==item.type?'selected':''}>${t.icon}</option>`).join('')}
            </select>
            <input type="text" class="activity" value="${item.activity.replace(/"/g,'&quot;')}" onchange="updateItem(${i}, ${idx}, 'activity', this.value)" placeholder="활동을 입력하세요">
            ${mappable ? `<button class="icon-btn map-btn" onclick="toggleMap(this, '${query}')" title="지도 보기">📍</button>` : `<span></span>`}
            <button class="icon-btn detail-btn${item.detail ? ' has-detail' : ''}" onclick="toggleDetail(this)" title="상세 내용">📝</button>
            <button class="icon-btn del-btn" onclick="deleteItem(${i}, ${idx})" title="삭제">✕</button>
          </div>
          <div class="detail-panel">${item.detail ? `<textarea oninput="updateItem(${i}, ${idx}, 'detail', this.value)" placeholder="상세 내용을 입력하세요...">${item.detail.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>` : `<textarea oninput="updateItem(${i}, ${idx}, 'detail', this.value)" placeholder="상세 내용을 입력하세요..."></textarea>`}</div>
          <div class="map-panel"></div>
        </div>
      `;}).join('');

    panel.innerHTML = `
      <div class="day-header">
        <div>
          <h2>DAY ${i} · ${data[i].label}</h2>
          <div class="date">${formatDate(start, i-1)}</div>
        </div>
        <button class="add-btn" onclick="addItem(${i})">+ 일정 추가</button>
      </div>
      <div class="schedule-list">${itemsHtml}</div>
    `;
    panels.appendChild(panel);
  }
  updateSummary();
}

function updateItem(day, idx, field, value) {
  data[day].items[idx][field] = field === 'type' ? parseInt(value) : value;
}

function extractPlace(activity) {
  // 활동 텍스트에서 장소명만 추출 (구분자 - 앞쪽, 괄호 안 정보 제거)
  let s = activity.split(/[-–]/)[0].trim();
  s = s.replace(/\([^)]*\)/g, '').trim();
  s = s.replace(/(체크인|체크아웃|조식|점심|저녁|관람|이동|픽업|반납|산책|쇼핑|출발|도착|에서|일몰|일출|감상|스노클링|물놀이|아침|야경|잠깐|들르기)/g, '').trim();
  return s || activity;
}

function toggleMap(btn, query) {
  const row = btn.closest('.schedule-row');
  const panel = row.querySelector('.map-panel');
  const isOpen = panel.classList.contains('open');
  // 같은 패널에 있는 다른 지도들 닫기
  document.querySelectorAll('.map-panel.open').forEach(p => {
    p.classList.remove('open');
    p.innerHTML = '';
  });
  document.querySelectorAll('.map-btn.active').forEach(b => b.classList.remove('active'));
  if (!isOpen) {
    panel.innerHTML = `
      <iframe src="https://www.google.com/maps?q=${query}&output=embed" loading="lazy"></iframe>
      <a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${query}" target="_blank">↗ 구글 지도에서 열기</a>
    `;
    panel.classList.add('open');
    btn.classList.add('active');
  }
}

function toggleDetail(btn) {
  const row = btn.closest('.schedule-row');
  const panel = row.querySelector('.detail-panel');
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.detail-panel.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.detail-btn.active').forEach(b => b.classList.remove('active'));
  if (!isOpen) {
    panel.classList.add('open');
    btn.classList.add('active');
    panel.querySelector('textarea').focus();
  }
}

function addItem(day) {
  data[day].items.push({ time: '12:00', type: 3, activity: '', detail: '' });
  // sort by time
  data[day].items.sort((a, b) => a.time.localeCompare(b.time));
  renderPanels();
}

function deleteItem(day, idx) {
  if (confirm('이 일정을 삭제할까요?')) {
    data[day].items.splice(idx, 1);
    renderPanels();
  }
}

function updateSummary() {
  let total = 0, meals = 0, spots = 0;
  for (let i = 1; i <= 5; i++) {
    total += data[i].items.length;
    meals += data[i].items.filter(x => x.type === 2).length;
    spots += data[i].items.filter(x => x.type === 3).length;
  }
  document.getElementById('totalItems').textContent = total;
  document.getElementById('totalMeals').textContent = meals;
  document.getElementById('totalSpots').textContent = spots;
}

function saveData() {
  localStorage.setItem('okinawaTrip', JSON.stringify(data));
  alert('일정이 저장되었습니다! 🌺');
}

function resetData() {
  if (confirm('현재 일정을 모두 지우고 기본 일정으로 되돌릴까요?')) {
    localStorage.removeItem('okinawaTrip');
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    renderTabs();
    renderPanels();
  }
}

function exportData() {
  const start = document.getElementById('startDate').value;
  let text = `🌺 오키나와 4박 5일 여행 일정\n${'='.repeat(40)}\n\n`;
  for (let i = 1; i <= 5; i++) {
    text += `📅 DAY ${i} · ${data[i].label} (${formatDate(start, i-1)})\n`;
    text += '-'.repeat(40) + '\n';
    data[i].items.forEach(item => {
      text += `  ${item.time}  ${TYPES[item.type].icon} ${item.activity}\n`;
    });
    text += '\n';
  }
  navigator.clipboard.writeText(text).then(() => {
    alert('일정이 클립보드에 복사되었습니다! 📋');
  });
}

document.getElementById('startDate').addEventListener('change', updateEndDate);
updateEndDate();
</script>
</body>
</html>
